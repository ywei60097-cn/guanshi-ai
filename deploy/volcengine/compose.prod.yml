services:
  api:
    build:
      context: ../..
      dockerfile: deploy/volcengine/Dockerfile
    env_file: .env
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    expose:
      - "8080"
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      API_DOMAIN: ${API_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - internal

networks:
  internal:

volumes:
  caddy_data:
  caddy_config:
